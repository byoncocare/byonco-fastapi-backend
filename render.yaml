# Render Blueprint for FastAPI Backend
# This file helps Render auto-configure your service
services:
  - type: web
    name: byonco-fastapi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RAZORPAY_KEY_ID
        sync: false  # Set manually in dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false  # Set manually in dashboard
      - key: SECRET_KEY
        sync: false  # Set manually in dashboard
      - key: MONGO_URL
        sync: false  # Set manually if using MongoDB
      - key: DB_NAME
        value: byonco

